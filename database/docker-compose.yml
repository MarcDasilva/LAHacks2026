services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lingbot-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: lingbot
      POSTGRES_USER: lingbot
      POSTGRES_PASSWORD: lingbot
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingbot -d lingbot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
